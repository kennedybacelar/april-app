name: Deploy to EC2

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  AWS_REGION: eu-south-2
  ECR_REGISTRY: 804306814416.dkr.ecr.eu-south-2.amazonaws.com
  ECR_REPOSITORY: fastapi-demo
  CONTAINER_NAME: fastapi-demo

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        working-directory: ./app
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$GITHUB_SHA .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$GITHUB_SHA $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$GITHUB_SHA
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Get EC2 instance ID
        id: get-instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=free-tier-web-server" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Wait for SSM connectivity
        run: |
          echo "Waiting for instance ${{ steps.get-instance.outputs.instance_id }} to register with SSM..."
          for i in {1..30}; do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${{ steps.get-instance.outputs.instance_id }}" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || echo "NotFound")
            if [ "$STATUS" = "Online" ]; then
              echo "Instance is SSM-ready"
              exit 0
            fi
            echo "Attempt $i/30: SSM status=$STATUS, waiting 10s..."
            sleep 10
          done
          echo "ERROR: Instance failed to register with SSM after 5 minutes"
          exit 1

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ steps.get-instance.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -euo pipefail",
              "REGION=\"${{ env.AWS_REGION }}\"",
              "ECR_REGISTRY=\"${{ env.ECR_REGISTRY }}\"",
              "ECR_IMAGE=\"${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}\"",
              "CONTAINER_NAME=\"${{ env.CONTAINER_NAME }}\"",
              "aws ecr get-login-password --region \"$REGION\" | docker login --username AWS --password-stdin \"$ECR_REGISTRY\"",
              "docker pull \"$ECR_IMAGE\"",
              "docker stop \"$CONTAINER_NAME\" || true",
              "docker rm \"$CONTAINER_NAME\" || true",
              "INSTANCE_ID=$(TOKEN=$(curl -s -X PUT \"http://169.254.169.254/latest/api/token\" -H \"X-aws-ec2-metadata-token-ttl-seconds: 21600\") && curl -s -H \"X-aws-ec2-metadata-token: $TOKEN\" http://169.254.169.254/latest/meta-data/instance-id)",
              "docker run -d --name \"$CONTAINER_NAME\" --restart unless-stopped -p 80:80 --log-driver=awslogs --log-opt awslogs-region=\"$REGION\" --log-opt awslogs-group=\"/fastapi-demo\" --log-opt awslogs-stream=\"$INSTANCE_ID\" \"$ECR_IMAGE\""
            ]' \
            --comment "Deploy commit ${{ github.sha }}"
